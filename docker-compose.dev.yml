version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: warehouse-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-warehouse_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-warehouse_password}
      POSTGRES_DB: ${DB_NAME:-warehouse_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - warehouse-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-warehouse_user} -d ${DB_NAME:-warehouse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development with hot-reload)
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: warehouse-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-warehouse_user}:${DB_PASSWORD:-warehouse_password}@postgres:5432/${DB_NAME:-warehouse_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      # eBarimt configuration
      EBARIMT_ENABLED: ${EBARIMT_ENABLED:-true}
      EBARIMT_API_URL: ${EBARIMT_API_URL:-http://192.168.1.213:7080}
      EBARIMT_MERCHANT_TIN: ${EBARIMT_MERCHANT_TIN:-37900846788}
      EBARIMT_POS_NO: ${EBARIMT_POS_NO:-10012516}
      EBARIMT_BRANCH_NO: ${EBARIMT_BRANCH_NO:-3900846788}
      EBARIMT_DISTRICT_CODE: ${EBARIMT_DISTRICT_CODE:-06}
      # Prisma configuration
      PRISMA_CLI_QUERY_ENGINE_TYPE: binary
      PRISMA_CLIENT_ENGINE_TYPE: binary
    ports:
      - "${API_PORT:-4000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warehouse-network-dev
    volumes:
      # Mount source code for hot-reload
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./logs:/app/logs
      # Prevent overwriting node_modules
      - /app/node_modules
    command: npm run dev

  # Prisma Studio (Database GUI)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: warehouse-prisma-studio
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-warehouse_user}:${DB_PASSWORD:-warehouse_password}@postgres:5432/${DB_NAME:-warehouse_db}?schema=public
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warehouse-network-dev
    volumes:
      - ./prisma:/app/prisma
      - /app/node_modules
    command: npx prisma studio --hostname 0.0.0.0
    profiles:
      - tools

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: warehouse-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@warehouse.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - warehouse-network-dev
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    profiles:
      - tools

volumes:
  postgres_data_dev:
    driver: local
  pgadmin_data_dev:
    driver: local

networks:
  warehouse-network-dev:
    driver: bridge

